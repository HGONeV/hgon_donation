<f:variable name="bank" value="{settings.bankAccount.bank}" />
<f:variable name="iban" value="{settings.bankAccount.iban}" />
<f:variable name="bic" value="{settings.bankAccount.bic}" />

<f:if condition="{settings.bankAccountSidebar.bank.institute}">
    <f:variable name="bank" value="{settings.bankAccountSidebar.bank.institute}" />
</f:if>
<f:if condition="{settings.bankAccountSidebar.bank.iban}">
    <f:variable name="iban" value="{settings.bankAccountSidebar.bank.iban}" />
</f:if>
<f:if condition="{settings.bankAccountSidebar.bank.bic}">
    <f:variable name="bic" value="{settings.bankAccountSidebar.bank.bic}" />
</f:if>

<f:if condition="{iban} && {bic}">
    <aside class="aside color-bg-cta">
        <header class="aside__header">
            <h6><f:translate key="tx_hgondonation_templates_donation_bankAccountSidebar.title" /></h6>
        </header>
        <div class="aside__content">
            <p>
                <f:if condition="{bank}">
                    {bank}<br>
                </f:if>
                <strong>BIC</strong> {bic}<br>
                <strong>IBAN</strong> {iban}
            </p>
        </div>
    </aside>
</f:if>
